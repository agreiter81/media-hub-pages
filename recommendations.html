function renderPlatformTag(name) {
    const logo = PROVIDER_LOGOS[name];
    if (logo) return '<img src="'+logo+'" alt="'+escHtml(name)+'" title="'+escHtml(name)+'" style="width:24px;height:24px;border-radius:4px">';
    return '';
}

async function addToWatchlist(type, tmdbId, slug, btn) {
    let pin = prompt('Enter your PIN:');
    if (!pin) return;
    btn.textContent = '...'; btn.className = 'add-btn loading'; btn.disabled = true;
    try {
        const resp = await fetch('https://media-hub-api.agreiter81.workers.dev/api/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tmdb_id: tmdbId, type: type, pin: pin })
        });
        if (resp.status === 401) {
            btn.textContent = '+ Add to Watchlist'; btn.className = 'add-btn'; btn.disabled = false;
            alert('Wrong PIN. Try again.');
            return;
        }
        if (resp.ok || resp.status === 409) {
            btn.textContent = resp.status === 409 ? '✓ Already Added!' : '✓ Added!'; btn.className = 'add-btn added';
        } else {
            console.error('Worker error:', resp.status);
            btn.textContent = '✗ Error'; btn.className = 'add-btn error'; btn.disabled = false;
        }
    } catch(e) { btn.textContent = '✗ Error'; btn.className = 'add-btn error'; btn.disabled = false; }
}

// Group recs by source_title
const groups = {};
RECS.forEach(r => {
    if (!groups[r.source_title]) groups[r.source_title] = { poster: r.source_poster, items: [] };
    groups[r.source_title].items.push(r);
});

let html = '';
for (const [source, data] of Object.entries(groups)) {
    const posterImg = data.poster ? '<img class="rec-source-poster" src="'+escHtml(data.poster)+'" alt="">' : '';
    html += '<div class="rec-group"><div class="rec-group-header">' + posterImg +
            '<div><div class="rec-source-label">Because you watched</div>' +
            '<div class="rec-source-title">' + escHtml(source) + '</div></div></div><div class="grid">';
    data.items.forEach(r => {
        const poster = r.poster ? '<img src="'+escHtml(r.poster)+'" alt="" loading="lazy">'
                                : '<div class="no-poster">'+(r.kind==='tv'?'📺':'🎬')+'</div>';
        const rating = r.vote_average ? '<div class="rating-badge">★ '+r.vote_average+'</div>' : '';
        const typeB = '<div class="type-badge">'+(r.kind==='tv'?'📺 TV':'🎬 Movie')+'</div>';
        const yr = r.release_date ? r.release_date.substring(0,4) : '';
        const genres = (r.genres||[]).map(g => '<span class="gtag">'+escHtml(g)+'</span>').join('');
        const slug = r.trakt_slug || '';
        const traktUrl = slug
            ? 'https://trakt.tv/'+(r.kind==='tv'?'shows':'movies')+'/'+slug
            : 'https://trakt.tv/search?query='+encodeURIComponent(r.title)+'&type='+(r.kind==='tv'?'show':'movie');
        const trailerUrl = r.trailer_key
            ? 'https://www.youtube.com/watch?v='+r.trailer_key
            : 'https://www.youtube.com/results?search_query='+encodeURIComponent(r.title+' official trailer');
        html += '<div class="card"><div class="poster">'+poster+rating+typeB+'</div><div class="info">' +
                '<div class="card-title">'+escHtml(r.title)+(yr?'<span class="year">'+yr+'</span>':'')+'</div>' +
                (genres?'<div class="genres">'+genres+'</div>':'') +
                (r.actors?'<div class="actors">'+escHtml(r.actors)+'</div>':'') +
                ((r.platforms&&r.platforms.length)?'<div class="platforms">'+(r.platforms.map(p=>renderPlatformTag(p)).join(''))+'</div>':'') +
                (r.overview?'<div class="overview">'+escHtml(r.overview)+'</div>':'') +
                '<div class="links">' +
                '<button class="add-btn none" onclick="addToWatchlist(\''+r.kind+'\','+r.tmdb_id+',\''+escHtml(slug)+'\',this)">+ Add to Watchlist</button>' +
                '<a class="trakt-link" href="'+traktUrl+'" target="_blank">View on Trakt ↗</a>' +
                '<a class="trakt-link" href="'+trailerUrl+'" target="_blank">🎬 Watch Trailer</a>' +
                '</div></div></div>';
    });
    html += '</div></div>';
}

if (!RECS.length) html = '<div style="text-align:center;color:#555;padding:60px">No recommendations yet. Watch some titles first!</div>';
document.getElementById('content').innerHTML = html;
</script></body></html>
